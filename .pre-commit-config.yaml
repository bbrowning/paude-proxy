repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        types: [go]

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

  # golangci-lint disabled due to upstream dependency issues (MirrexOne/unqueryvet 403)
  # Use 'make lint' (go vet) instead
