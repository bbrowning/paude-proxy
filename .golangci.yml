run:
  timeout: 5m
  go: "1.23"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - goimports
    - misspell
    - gosec
    - unconvert

linters-settings:
  gofmt:
    simplify: true
  gosec:
    excludes:
      - G402 # TLS InsecureSkipVerify — proxy tests need this

issues:
  exclude-use-default: true
